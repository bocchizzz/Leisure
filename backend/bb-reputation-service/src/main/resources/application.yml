server:
  port: 8083

spring:
  application:
    name: bb-reputation-service
  datasource:
    url: jdbc:h2:file:./data/bb-reputation;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

bb:
  reputation:
    internal-token: bangboo-internal-dev-token
    iam-base-url: http://127.0.0.1:8081
    marketplace-base-url: http://127.0.0.1:8082
    message-base-url: http://127.0.0.1:8084
