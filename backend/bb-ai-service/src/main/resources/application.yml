server:
  port: 8087

spring:
  application:
    name: bb-ai-service
  codec:
    max-in-memory-size: 10MB
  datasource:
    url: jdbc:h2:file:./data/bb-ai;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

bb:
  ai:
    internal-token: bangboo-internal-dev-token
    court-base-url: http://127.0.0.1:8086
    admin-ops-base-url: http://127.0.0.1:8088
    asset-base-url: /uploads/ai
    # 文件服务基地址，用于将相对图片路径拼成全 URL 下载参考图
    file-base-url: http://127.0.0.1:8080
    # AI 生成图片的本地存储目录
    upload-dir: data/ai-images
    # 生成方式：rule=规则/模板（默认，零依赖）；llm=接入真实大模型（DeepSeek）
    provider: llm
    llm:
      # DeepSeek 接口地址（OpenAI 兼容协议）
      base-url: https://api.deepseek.com
      # DeepSeek API Key，直接填写你申请到的密钥（形如 sk-xxxx）
      # 注意：切勿把含真实 Key 的本文件提交到公开仓库
      api-key: 
      # 模型名：deepseek-chat（通用）或 deepseek-reasoner（推理增强）
      model: deepseek-chat
      # 提示词版本，用于落表追溯
      prompt-version: v1
      # 调用超时秒数
      timeout-seconds: 30
    # 文生图 / 图生图（通义万相 wan2.7-image-pro，阿里云 DashScope）配置
    wanx:
      base-url: https://ws-m9vfjhdzyog2j68a.cn-beijing.maas.aliyuncs.com/
      # 通义万相 API Key，先填占位；拿到真实 Key 后替换即可启用文生图，留空则用规则占位图
      api-key: 
      model: wan2.7-image-pro
      size: 1K
      max-poll-times: 20
      poll-interval-ms: 2000
      timeout-seconds: 30
