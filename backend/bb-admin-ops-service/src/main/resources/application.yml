server:
  port: 8088

spring:
  application:
    name: bb-admin-ops-service
  datasource:
    url: jdbc:h2:file:./data/bb-admin-ops;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

bb:
  admin-ops:
    internal-token: bangboo-internal-dev-token
    iam-base-url: http://127.0.0.1:8081
    marketplace-base-url: http://127.0.0.1:8082
    reputation-base-url: http://127.0.0.1:8083
    ai-base-url: http://127.0.0.1:8087

management:
  endpoints:
    web:
      exposure:
        include: health,info
