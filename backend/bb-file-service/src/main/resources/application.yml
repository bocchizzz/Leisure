server:
  port: 8085

spring:
  application:
    name: bb-file-service
  datasource:
    url: jdbc:h2:file:./data/bb-file;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

bb:
  file:
    upload-dir: data/uploads
    max-size-bytes: 8388608
    allowed-mime-types:
      - image/png
      - image/jpeg
      - image/webp
      - application/pdf

management:
  endpoints:
    web:
      exposure:
        include: health,info
