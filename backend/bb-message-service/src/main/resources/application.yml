server:
  port: 8084

spring:
  application:
    name: bb-message-service
  datasource:
    url: jdbc:h2:file:./data/bb-message;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

bb:
  message:
    internal-token: bangboo-internal-dev-token

management:
  endpoints:
    web:
      exposure:
        include: health,info
